<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUJIFILM Film Simulation Recipe Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
/* Reset & Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    overflow-x: hidden;
    overscroll-behavior-x: none;
}

:root {
    --bg-main: #ffffff;
    --bg-gradient: linear-gradient(135deg, #ffffff 0%, #f5f5f7 100%);
    --bg-surface: rgba(245, 245, 247, 0.85);
    --bg-surface-hover: rgba(235, 235, 240, 0.9);
    --bg-modal: rgba(255, 255, 255, 0.97);

    --border-color: rgba(0, 0, 0, 0.08);
    --border-color-hover: rgba(0, 0, 0, 0.15);

    --text-primary: #1a1a1a;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;

    --accent-orange: #d4531d;
    --accent-gold: #8b6914;
    --accent-teal: #059669;
    --danger-red: #dc2626;

    --font-outfit: 'Outfit', sans-serif;
    --font-jp: 'Noto Sans JP', sans-serif;
    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 4px 10px -5px rgba(0, 0, 0, 0.06);
    --shadow-glow: 0 0 12px rgba(212, 83, 29, 0.1);

    --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);

    --font-size-base: 16px;
}

body {
    background-color: var(--bg-main);
    background-image: var(--bg-gradient);
    color: var(--text-primary);
    font-family: var(--font-jp);
    font-size: var(--font-size-base);
    min-height: 100vh;
    overflow-x: hidden;
    overscroll-behavior-x: none;
    touch-action: pan-y pinch-zoom;
    letter-spacing: 0.02em;
}

body.font-small { --font-size-base: 14px; }
body.font-large { --font-size-base: 18px; }

/* Custom Scrollbar */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}
::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.03);
}
::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.15);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 0, 0, 0.25);
}

/* App Container */
.app-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
}

/* Header Section */
.app-header {
    text-align: center;
    margin-bottom: 2.5rem;
}

.logo-area {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
}

.brand {
    font-family: var(--font-outfit);
    font-weight: 800;
    font-size: 2.2rem;
    letter-spacing: 0.15em;
    color: var(--text-primary);
}

.separator {
    color: var(--accent-orange);
    font-size: 1.8rem;
    font-weight: 300;
}

.title {
    font-family: var(--font-outfit);
    font-weight: 400;
    font-size: 1.8rem;
    letter-spacing: 0.15em;
    color: var(--accent-gold);
}

.subtitle {
    color: var(--text-secondary);
    font-size: 0.95rem;
    font-weight: 400;
    opacity: 0.85;
}

/* Font Size Controls */
.fontsize-controls {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    background: rgba(0, 0, 0, 0.04);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 0.2rem;
}

.fontsize-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 0.35rem 0.6rem;
    font-size: 0.75rem;
    font-weight: 600;
    font-family: var(--font-outfit);
    border-radius: 6px;
    cursor: pointer;
    transition: var(--transition-smooth);
    line-height: 1;
}
.fontsize-btn:hover {
    background: rgba(0, 0, 0, 0.06);
    color: var(--text-primary);
}
.fontsize-btn.active {
    background: var(--text-primary);
    color: #ffffff;
}

/* Control Panel */
.control-panel {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 1.5rem;
    background: var(--bg-surface);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 1.25rem;
    box-shadow: var(--shadow-sm);
}

@media (min-width: 768px) {
    .control-panel {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
    }
}

/* Search Wrapper */
.search-wrapper {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
}

.search-icon {
    position: absolute;
    left: 1rem;
    width: 1.25rem;
    height: 1.25rem;
    color: var(--text-muted);
}

.search-wrapper input {
    width: 100%;
    padding: 0.75rem 1rem 0.75rem 2.75rem;
    background: rgba(0, 0, 0, 0.03);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 0.95rem;
    font-family: var(--font-jp);
    outline: none;
    transition: var(--transition-smooth);
}

.search-wrapper input:focus {
    border-color: var(--accent-gold);
    box-shadow: 0 0 8px rgba(139, 105, 20, 0.1);
    background: rgba(0, 0, 0, 0.02);
}

.search-wrapper input::placeholder {
    color: var(--text-muted);
}

.clear-btn {
    position: absolute;
    right: 0.75rem;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.25rem;
}

.clear-btn:hover svg {
    color: var(--text-primary);
}

.clear-btn svg {
    width: 1.1rem;
    height: 1.1rem;
    transition: var(--transition-smooth);
}

/* Filter Controls */
.filter-controls {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
}

.tabs {
    display: flex;
    background: rgba(0, 0, 0, 0.04);
    border: 1px solid var(--border-color);
    padding: 0.25rem;
    border-radius: 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 0.5rem 1.1rem;
    font-size: 0.85rem;
    font-weight: 500;
    font-family: var(--font-outfit);
    border-radius: 8px;
    cursor: pointer;
    transition: var(--transition-smooth);
    flex-shrink: 0;
    white-space: nowrap;
}

.tab-btn.active {
    background: var(--text-primary);
    color: #ffffff;
    font-weight: 600;
}

/* Favorite Toggle Button */
.fav-toggle-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(0, 0, 0, 0.04);
    border: 1px solid var(--border-color);
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    border-radius: 10px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: var(--transition-smooth);
    font-weight: 500;
}

.fav-toggle-btn:hover {
    border-color: var(--accent-orange);
    color: var(--accent-orange);
}

.fav-toggle-btn.active {
    background: rgba(212, 83, 29, 0.08);
    border-color: var(--accent-orange);
    color: var(--accent-orange);
}

.fav-toggle-btn.active svg {
    fill: var(--accent-orange);
}

.fav-toggle-btn svg {
    width: 1.1rem;
    height: 1.1rem;
    transition: var(--transition-smooth);
}

.counter {
    background: rgba(0, 0, 0, 0.08);
    color: var(--text-primary);
    padding: 0.1rem 0.4rem;
    border-radius: 10px;
    font-size: 0.75rem;
    margin-left: 0.25rem;
    font-family: var(--font-outfit);
}

.fav-toggle-btn.active .counter {
    background: var(--accent-orange);
    color: white;
}

/* Stats Panel */
.stats-panel {
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.stats-panel::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background-color: var(--accent-teal);
    box-shadow: 0 0 6px var(--accent-teal);
}

/* Recipe Grid */
.recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
    position: relative;
    min-height: 200px;
}

/* Recipe Card */
.recipe-card {
    background: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 380px;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: var(--transition-smooth);
}

.recipe-card:hover {
    transform: translateY(-5px);
    border-color: var(--border-color-hover);
    box-shadow: var(--shadow-lg), var(--shadow-glow);
}

/* Card Image Area */
.card-image-area {
    position: relative;
    height: 200px;
    background: #f0f0f2;
    overflow: hidden;
}

.card-image-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.recipe-card:hover .card-image-area img {
    transform: scale(1.06);
}

.card-img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e8e8ec 0%, #f0f0f2 100%);
    color: var(--text-muted);
}

.card-img-placeholder span {
    font-size: 0.8rem;
    font-family: var(--font-outfit);
    letter-spacing: 0.08em;
}

.card-fav-btn {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(0,0,0,0.08);
    width: 2.2rem;
    height: 2.2rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    z-index: 5;
    transition: var(--transition-smooth);
}

.card-fav-btn:hover {
    background: rgba(255, 255, 255, 0.95);
    transform: scale(1.1);
    color: var(--accent-orange);
}

.card-fav-btn.active {
    color: var(--accent-orange);
}

.card-fav-btn.active svg {
    fill: var(--accent-orange);
}

.card-fav-btn svg {
    width: 1.1rem;
    height: 1.1rem;
    stroke-width: 2.2px;
}


.card-source-btn {
    position: absolute;
    top: 0.75rem;
    left: 0.75rem;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(0,0,0,0.08);
    width: 2.2rem;
    height: 2.2rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    z-index: 5;
    transition: var(--transition-smooth);
}

.card-source-btn:hover {
    background: rgba(255, 255, 255, 0.95);
    transform: scale(1.1);
    color: var(--accent-gold);
}

.card-source-btn svg {
    width: 1.1rem;
    height: 1.1rem;
    stroke-width: 2.2px;
}

/* Card Body */
.card-body {
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex-grow: 1;
}

.card-meta-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
}

.card-gen {
    font-family: var(--font-outfit);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent-gold);
    letter-spacing: 0.05em;
}

.card-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.4;
    height: 2.8rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 0.75rem;
}

.card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(0, 0, 0, 0.06);
    padding-top: 0.75rem;
}

.card-sim {
    font-size: 0.75rem;
    background: rgba(0, 0, 0, 0.04);
    border: 1px solid rgba(0,0,0,0.06);
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
    color: var(--text-secondary);
}

.card-arrow {
    width: 1.25rem;
    height: 1.25rem;
    color: var(--text-muted);
    transition: var(--transition-smooth);
}

.recipe-card:hover .card-arrow {
    color: var(--accent-gold);
    transform: translateX(3px);
}

/* Loading & Spinner */
.loading-spinner-wrapper {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5rem 0;
    color: var(--text-secondary);
}

.spinner {
    width: 2.5rem;
    height: 2.5rem;
    border: 3px solid rgba(0, 0, 0, 0.08);
    border-top-color: var(--accent-gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 1rem;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Detail Modal Overlay */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    z-index: 1000;
    transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    padding: 1.5rem;
}

.modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
}

/* Modal Container */
.modal-container {
    background: var(--bg-modal);
    border: 1px solid var(--border-color-hover);
    border-radius: 20px;
    width: 100%;
    max-width: 1000px;
    height: auto;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
    transform: scale(0.95);
    transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.modal-overlay.open .modal-container {
    transform: scale(1);
}

.modal-close-btn {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    background: rgba(0, 0, 0, 0.06);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: var(--transition-smooth);
    z-index: 10;
}

.modal-close-btn:hover {
    background: var(--danger-red);
    border-color: var(--danger-red);
    color: white;
    transform: rotate(90deg);
}

.modal-close-btn svg {
    width: 1.25rem;
    height: 1.25rem;
}

/* Modal Content Grid */
.modal-content {
    display: grid;
    grid-template-columns: 1fr;
    height: 100%;
}

@media (min-width: 768px) {
    .modal-content {
        grid-template-columns: 1.1fr 1fr;
    }
}

/* Modal Media Section (Left) */
.modal-media-section {
    padding: 2.5rem 2rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-color);
}

@media (min-width: 768px) {
    .modal-media-section {
        border-bottom: none;
        border-right: 1px solid var(--border-color);
    }
}

.modal-image-wrapper {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: #f0f0f2;
    width: 100%;
    aspect-ratio: 3/2;
    margin-bottom: 1.5rem;
    border: 1px solid rgba(0, 0, 0, 0.06);
}

.modal-image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.image-fallback {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e8e8ec 0%, #f0f0f2 100%);
    color: var(--text-muted);
    font-family: var(--font-outfit);
    font-weight: 500;
    letter-spacing: 0.1em;
}

.modal-meta h2 {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 0.75rem;
    line-height: 1.3;
}

.tag-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
}

.gen-tag {
    font-family: var(--font-outfit);
    font-size: 0.75rem;
    font-weight: 700;
    background: rgba(139, 105, 20, 0.08);
    border: 1px solid var(--accent-gold);
    color: var(--accent-gold);
    padding: 0.25rem 0.6rem;
    border-radius: 6px;
}

.sim-tag {
    font-size: 0.75rem;
    font-weight: 600;
    background: rgba(0, 0, 0, 0.04);
    border: 1px solid rgba(0, 0, 0, 0.08);
    color: var(--text-secondary);
    padding: 0.25rem 0.6rem;
    border-radius: 6px;
}

.modal-desc-note {
    font-size: 0.8rem;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 1.5rem;
}

.source-link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: rgba(0, 0, 0, 0.04);
    border: 1px solid var(--border-color);
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    color: var(--text-primary);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: var(--transition-smooth);
}

.source-link-btn:hover {
    background: var(--text-primary);
    color: #ffffff;
    border-color: var(--text-primary);
}

.source-link-btn svg {
    width: 1.1rem;
    height: 1.1rem;
}

/* Modal Settings Section (Right) - Fujifilm Camera LCD UI Style */
.modal-settings-section {
    background: #1a1b1e;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
    border-radius: 0 0 20px 0;
}

@media (max-width: 767px) {
    .modal-settings-section {
        border-radius: 0 0 20px 20px;
    }
}

.camera-screen-header {
    background: #111214;
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #000;
}

@media (min-width: 768px) {
    .camera-screen-header {
        border-radius: 0 20px 0 0;
    }
}

.screen-title {
    font-family: var(--font-outfit);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #9aa0a6;
}

/* Battery Indicator Mockup */
.battery-indicator {
    display: flex;
    align-items: center;
    gap: 0.35rem;
}

.battery-percent {
    font-family: var(--font-outfit);
    font-size: 0.7rem;
    font-weight: 600;
    color: #62676d;
}

.battery-body {
    width: 18px;
    height: 10px;
    border: 1.5px solid #62676d;
    border-radius: 2px;
    padding: 1px;
    position: relative;
    display: flex;
}

.battery-body::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 2px;
    width: 1.5px;
    height: 4px;
    background: #62676d;
    border-radius: 0 1px 1px 0;
}

.battery-fill {
    background: #10b981;
    width: 100%;
    height: 100%;
}

/* Camera Menu Settings List */
.camera-menu-list {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    background: #1a1b1e;
    border-left: 2px solid #0a0b0c;
}

/* Settings Row Layout */
.menu-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid #252629;
    font-family: var(--font-outfit);
    font-size: 0.85rem;
    letter-spacing: 0.03em;
}

.menu-row.highlighted {
    background: #b85a1e;
    color: white;
}

.menu-row.highlighted .setting-val {
    color: white;
}

.setting-key {
    font-weight: 600;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.75);
}

.menu-row.highlighted .setting-key {
    color: white;
}

.setting-val {
    font-weight: 700;
    color: #c5a880;

// ===== IndexedDB =====
function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains(STORE_NAME)) {
                database.createObjectStore(STORE_NAME, { keyPath: 'id' });
            }
            if (!database.objectStoreNames.contains(PHOTO_STORE)) {
                database.createObjectStore(PHOTO_STORE, { keyPath: 'recipeId' });
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            resolve(db);
        };
        request.onerror = (e) => reject(e.target.error);
    });
}

function dbGetAll() {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result);
        request.onerror = (e) => reject(e.target.error);
    });
}

function dbPut(recipe) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const request = store.put(recipe);
        request.onsuccess = () => resolve(request.result);
        request.onerror = (e) => reject(e.target.error);
    });
}

function dbDelete(id) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const request = store.delete(id);
        request.onsuccess = () => resolve();
        request.onerror = (e) => reject(e.target.error);
    });
}

// ===== Font Size =====
function setFontSize(size) {
    document.body.classList.remove('font-small', 'font-large');
    if (size === 'small') document.body.classList.add('font-small');
    else if (size === 'large') document.body.classList.add('font-large');

    document.querySelectorAll('.fontsize-btn').forEach(btn => {

(function restoreFontSize() {

    if (saved && saved !== 'medium') setFontSize(saved);
})();

// ===== Backup / Restore =====
async function exportBackup() {
    try {
        const data = {
            version: 1,
            exportedAt: new Date().toISOString(),
            favorites: Array.from(favorites),
            myRecipes: myRecipes,
            recipePhotos: recipePhotos
        };
        const json = JSON.stringify(data);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `fuji-recipe-backup-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    } catch (e) {
        alert('バックアップの作成に失敗しました: ' + e.message);
    }
}

function importBackup() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
            const text = await file.text();
            const data = JSON.parse(text);
            if (!data.version || !data.favorites) {
                alert('無効なバックアップファイルです。');
                return;
            }
            if (!confirm('現在のデータを上書きして復元しますか？')) return;

            favorites = new Set(data.favorites || []);
            localStorage.setItem('fuji_favorites_original', JSON.stringify(Array.from(favorites)));

            if (data.myRecipes && data.myRecipes.length > 0) {
                for (const recipe of data.myRecipes) {
                    await dbPut(recipe);
                }
                myRecipes = data.myRecipes;
            }

            if (data.recipePhotos) {
                for (const [recipeId, images] of Object.entries(data.recipePhotos)) {
                    await photoPut(recipeId, images);
                }
                recipePhotos = data.recipePhotos;
            }

            renderCards();
            updateFavCount();
            alert('復元が完了しました！');
        } catch (err) {
            alert('復元に失敗しました: ' + err.message);
        }
    };
    input.click();
}

// ===== Image Helpers =====
function readFileAsDataURL(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsDataURL(file);
    });
}

async function compressImage(dataUrl, maxWidth = 800) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width;
            let h = img.height;
            if (w > maxWidth) {
                h = (maxWidth / w) * h;
                w = maxWidth;
            }
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.src = dataUrl;
    });
}

function getCombinedRecipes() {
    const myMapped = myRecipes.map(r => ({

        generation: 'myrecipe',
        isMyRecipe: true
    }));
    return [...allRecipes, ...myMapped];

// Render Recipe Cards Grid
function renderRecipes() {
    const query = searchInput.value.toLowerCase().trim();
    const combined = getCombinedRecipes();

    const filteredRecipes = combined.filter(recipe => {
        if (currentFilter === 'myrecipe') {
            if (!recipe.isMyRecipe) return false;
        } else if (currentFilter !== 'all') {
            if (recipe.isMyRecipe) return false;
            if (recipe.generation !== currentFilter) return false;
        }

        if (showFavoritesOnly && !favorites.has(recipe.id)) return false;

        if (query) {
            const inTitle = recipe.title.toLowerCase().includes(query);
            const inSim = (recipe.settings.film_simulation || '').toLowerCase().includes(query);
            let inSettings = false;
            for (const key in recipe.settings) {
                if ((recipe.settings[key] || '').toLowerCase().includes(query)) {
                    inSettings = true;
                    break;
                }
            }
            return inTitle || inSim || inSettings;
        }

        return true;
    });

    if (filteredRecipes.length === 0) {
        const emptyMsg = currentFilter === 'myrecipe'
            ? 'マイレシピがまだありません。「マイレシピ作成」ボタンから追加できます。'
            : '一致するレシピが見つかりませんでした';
        resultCountEl.textContent = emptyMsg;
        recipeGrid.innerHTML = `
            <div class="loading-spinner-wrapper">
                <p>${emptyMsg}</p>
            </div>
        `;
        return;
    }

    resultCountEl.textContent = `${filteredRecipes.length} 件のレシピが見つかりました`;

    recipeGrid.innerHTML = filteredRecipes.map(recipe => {
        const isFav = favorites.has(recipe.id);
        const isMyRecipe = recipe.isMyRecipe;
        const userPhotos = recipePhotos[recipe.id];

        let imageHtml;
        if (isMyRecipe && recipe.images && recipe.images.length > 0) {
            imageHtml = `<img src="${recipe.images[0]}" alt="${recipe.title}" loading="lazy">`;
        } else if (userPhotos && userPhotos.length > 0) {
            imageHtml = `<img src="${userPhotos[0]}" alt="${recipe.title}" loading="lazy">`;
        } else if (recipe.imageUrl) {
            imageHtml = `<img src="${recipe.imageUrl}" alt="${recipe.title}" loading="lazy">`;
        } else {
            imageHtml = `<div class="card-img-placeholder"><span>NO PHOTO</span></div>`;
        }

        const badgeLabel = isMyRecipe ? 'MY' : recipe.generation;
        const badgeClass = isMyRecipe ? 'card-gen my-recipe-badge' : 'card-gen';
        const baseSim = recipe.settings.film_simulation || 'Unknown Sim';

        const editBtn = isMyRecipe ? `
            <button class="card-edit-btn" data-myid="${recipe.id}" title="編集">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
            </button>` : '';

        const uploadBtn = !isMyRecipe ? `
            <button class="card-upload-btn" data-id="${recipe.id}" title="作例写真をアップロード">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </button>` : '';

        return `

                    ${imageHtml}

                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                        </svg>
                    </button>
                </div>
                <div class="card-body">

                        <div class="card-meta-top">

// Setup Card Click Event Handlers
function setupCardClicks() {
    document.querySelectorAll('.recipe-card').forEach(card => {
        card.addEventListener('click', (e) => {
            if (e.target.closest('.card-fav-btn') || e.target.closest('.card-edit-btn') || e.target.closest('.card-upload-btn')) return;
            const recipeId = card.getAttribute('data-id');
            const isMyRecipe = card.getAttribute('data-myrecipe') === 'true';

            if (isMyRecipe) {
                const recipe = myRecipes.find(r => r.id === recipeId);
                if (recipe) openModal({ ...recipe, generation: 'myrecipe', isMyRecipe: true });
            } else {
                const recipe = allRecipes.find(r => r.id === recipeId);
                if (recipe) openModal(recipe);
            }
        });
    });

    document.querySelectorAll('.card-fav-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.getAttribute('data-id');
            toggleFavorite(id);
        });
    });

    document.querySelectorAll('.card-edit-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const myId = btn.getAttribute('data-myid');
            const recipe = myRecipes.find(r => r.id === myId);
            if (recipe) openCreateModal(recipe);
        });
    });

    document.querySelectorAll('.card-upload-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const recipeId = btn.getAttribute('data-id');
            openPhotoUpload(recipeId);
        });
    });
}

// ===== Photo Upload for Preset Recipes =====
let photoUploadRecipeId = null;

function openPhotoUpload(recipeId) {
    photoUploadRecipeId = recipeId;
    const recipe = allRecipes.find(r => r.id === recipeId);
    if (!recipe) return;

    uploadedImages = recipePhotos[recipeId] ? [...recipePhotos[recipeId]] : [];
    createModalTitle.textContent = `作例写真 - ${recipe.title}`;
    deleteRecipeBtn.style.display = 'none';

    // Hide all form fields except image upload
    document.querySelectorAll('.create-form-grid .form-section, .create-form-grid .form-row').forEach(el => {
        if (!el.querySelector('#imageUploadArea') && el.id !== 'imageUploadSection') {
            el.classList.add('photo-upload-hidden');
        }
    });

    renderUploadPreviews();
    createModal.classList.add('open');
    createModal.classList.add('photo-upload-mode');
    document.body.style.overflow = 'hidden';
}

function closePhotoUpload() {
    photoUploadRecipeId = null;
    createModal.classList.remove('photo-upload-mode');
    document.querySelectorAll('.photo-upload-hidden').forEach(el => {
        el.classList.remove('photo-upload-hidden');
    });
}

async function savePhotoUpload() {
    if (!photoUploadRecipeId) return;
    if (uploadedImages.length > 0) {
        await photoPut(photoUploadRecipeId, uploadedImages);
    } else {
        await photoDelete(photoUploadRecipeId);
    }
    await loadRecipePhotos();
    closePhotoUpload();
    closeCreateModal();
    renderRecipes();
}

// Open Detail Modal
function openModal(recipe) {
    const isMyRecipe = recipe.isMyRecipe;
    const userPhotos = recipePhotos[recipe.id];

    if (isMyRecipe && recipe.images && recipe.images.length > 0) {
        modalImage.src = recipe.images[0];
        modalImage.style.display = 'block';
        imageFallback.style.display = 'none';
    } else if (userPhotos && userPhotos.length > 0) {
        modalImage.src = userPhotos[0];
        modalImage.style.display = 'block';
        imageFallback.style.display = 'none';
    } else if (recipe.imageUrl) {
        modalImage.src = recipe.imageUrl;
        modalImage.style.display = 'block';
        imageFallback.style.display = 'none';
    } else {
        modalImage.src = '';
        modalImage.style.display = 'none';
        imageFallback.style.display = 'flex';
    }

    modalTitle.textContent = recipe.title;
    modalGenTag.textContent = isMyRecipe ? 'MY RECIPE' : recipe.generation;
    modalSimTag.textContent = recipe.settings.film_simulation || 'Unknown Sim';

    const modalDescNote = document.getElementById('modalDescNote');
    if (isMyRecipe) {
        modalDescNote.style.display = 'none';
    } else {
        modalDescNote.style.display = '';
    }

    // Clean up previous dynamic elements
    const existingGallery = document.querySelector('.modal-gallery');
    if (existingGallery) existingGallery.remove();
    const existingNotes = document.querySelector('.modal-notes');
    if (existingNotes) existingNotes.remove();
    const existingUploadBtn = document.querySelector('.modal-upload-btn');
    if (existingUploadBtn) existingUploadBtn.remove();

    // Gallery for multiple images (my recipe or user-uploaded photos)
    const photos = isMyRecipe ? (recipe.images || []) : (userPhotos || []);
    if (photos.length > 1) {
        const gallery = document.createElement('div');
        gallery.className = 'modal-gallery';
        photos.forEach(imgSrc => {
            const img = document.createElement('img');
            img.src = imgSrc;
            img.alt = 'Sample photo';
            img.addEventListener('click', () => {
                modalImage.src = imgSrc;
                modalImage.style.display = 'block';
                imageFallback.style.display = 'none';
            });
            gallery.appendChild(img);
        });
        document.querySelector('.modal-meta').appendChild(gallery);
    }

    if (isMyRecipe && recipe.notes) {
        const notesDiv = document.createElement('div');
        notesDiv.className = 'modal-notes';
        notesDiv.textContent = recipe.notes;
        document.querySelector('.modal-meta').appendChild(notesDiv);
    }

    // Add upload button for preset recipes in modal
    if (!isMyRecipe) {
        const uploadBtnEl = document.createElement('button');
        uploadBtnEl.className = 'modal-upload-btn';
        uploadBtnEl.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span>${photos.length > 0 ? '作例写真を編集' : '作例写真をアップロード'}</span>
        `;
        uploadBtnEl.addEventListener('click', () => {
            closeModal();
            openPhotoUpload(recipe.id);
        });
        document.querySelector('.modal-meta').appendChild(uploadBtnEl);
    }

    // Render camera menu
    cameraMenu.innerHTML = '';
    const orderedKeys = [
        'film_simulation', 'dynamic_range', 'grain_effect', 'grain_size',
        'color_chrome_effect', 'color_chrome_fx_blue', 'white_balance',
        'highlight_tone', 'shadow_tone', 'color', 'sharpness',
        'noise_reduction', 'clarity', 'exposure_compensation'
    ];

    let highlightedSet = false;
    orderedKeys.forEach(key => {
        if (recipe.settings[key] !== undefined && recipe.settings[key] !== '') {
            const label = settingLabels[key] || key.toUpperCase();
            const value = recipe.settings[key];
            const row = document.createElement('div');
            row.className = 'menu-row';
            if (!highlightedSet) {
                row.classList.add('highlighted');
                highlightedSet = true;
            }
            row.innerHTML = `
                <span class="setting-key">${label}</span>
                <span class="setting-val">${value}</span>
            `;
            cameraMenu.appendChild(row);
        }
    });

    recipeModal.classList.add('open');
    document.body.style.overflow = 'hidden';
}

// ===== EXIF Parser for Fujifilm =====
// Tag mappings based on ExifTool FujiFilm.pm and fuji-recipes library
function readFileAsArrayBuffer(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsArrayBuffer(file);
    });
}

function parseExifFromFile(file) {
    return readFileAsArrayBuffer(file).then(buffer => {
        try {
            return parseFujifilmExif(new DataView(buffer));
        } catch (e) {
            console.warn('EXIF parse failed:', e);
            return null;
        }
    });
}

function parseFujifilmExif(view) {
    if (view.getUint16(0) !== 0xFFD8) return null;
    let offset = 2;
    while (offset < view.byteLength - 1) {
        const marker = view.getUint16(offset);
        if (marker === 0xFFE1) {
            const length = view.getUint16(offset + 2);
            const exifStart = offset + 4;
            const sig = String.fromCharCode(
                view.getUint8(exifStart), view.getUint8(exifStart+1),
                view.getUint8(exifStart+2), view.getUint8(exifStart+3)
            );
            if (sig === 'Exif') {
                return parseExifBlock(view, exifStart + 6, length - 6);
            }
        }
        if ((marker & 0xFF00) !== 0xFF00) break;
        offset += 2 + view.getUint16(offset + 2);
    }
    return null;
}

function parseExifBlock(view, tiffStart, maxLen) {
    const bo = view.getUint16(tiffStart) === 0x4D4D;
    const le = !bo;
    const g16 = (o) => view.getUint16(tiffStart + o, le);
    const g32 = (o) => view.getUint32(tiffStart + o, le);

    if (g16(2) !== 0x002A) return null;
    const ifd0off = g32(4);

    const result = { make: '', model: '' };
    let exifIFDOff = 0;

    const ifd0count = g16(ifd0off);
    for (let i = 0; i < ifd0count; i++) {
        const entryOff = ifd0off + 2 + i * 12;
        const tag = g16(entryOff);
        const type = g16(entryOff + 2);
        const count = g32(entryOff + 4);
        const valOff = g32(entryOff + 8);
        if (tag === 0x010F) result.make = readExifString(view, tiffStart, type, count, valOff, entryOff + 8, le);
        if (tag === 0x0110) result.model = readExifString(view, tiffStart, type, count, valOff, entryOff + 8, le);
        if (tag === 0x8769) exifIFDOff = valOff;
    }

    if (!result.make.toUpperCase().includes('FUJI')) return result;

    let makerNoteOff = 0;
    let isoVal = '';
    let exposureComp = '';
    if (exifIFDOff) {
        const cnt = g16(exifIFDOff);
        for (let i = 0; i < cnt; i++) {
            const eo = exifIFDOff + 2 + i * 12;
            const tag = g16(eo);
            const type = g16(eo + 2);
            const count = g32(eo + 4);
            const vo = g32(eo + 8);
            if (tag === 0x927C) makerNoteOff = vo;
            if (tag === 0x8827) isoVal = type === 3 ? '' + g16(eo + 8) : '' + g32(eo + 8);
            if (tag === 0x9204) {
                const num = view.getInt32(tiffStart + vo, le);
                const den = view.getInt32(tiffStart + vo + 4, le);
                if (den) {
                    const ev = num / den;
                    if (ev === 0) exposureComp = '0';
                    else {
                        const sign = ev > 0 ? '+' : '';
                        const abs = Math.abs(ev);
                        const whole = Math.floor(abs);
                        const frac = abs - whole;
                        if (frac < 0.08) exposureComp = sign + whole;
                        else if (Math.abs(frac - 1/3) < 0.08) exposureComp = sign + (whole ? whole + ' ' : '') + '1/3';
                        else if (Math.abs(frac - 2/3) < 0.08) exposureComp = sign + (whole ? whole + ' ' : '') + '2/3';
                        else if (Math.abs(frac - 0.5) < 0.08) exposureComp = sign + (whole ? whole + ' ' : '') + '1/2';
                        else exposureComp = sign + ev.toFixed(1);
                    }
                }
            }
        }
    }

    result.iso = isoVal;
    result.exposureComp = exposureComp;

    if (!makerNoteOff) return result;

    try {
        const mnBase = tiffStart + makerNoteOff;
        const mnSig = String.fromCharCode(
            view.getUint8(mnBase), view.getUint8(mnBase+1), view.getUint8(mnBase+2), view.getUint8(mnBase+3),
            view.getUint8(mnBase+4), view.getUint8(mnBase+5), view.getUint8(mnBase+6), view.getUint8(mnBase+7)
        );
        if (mnSig !== 'FUJIFILM') return result;

        const mnOff = (o) => mnBase + o;
        const fg16 = (o) => view.getUint16(mnOff(o), true);
        const fg32 = (o) => view.getUint32(mnOff(o), true);
        const fi32 = (o) => view.getInt32(mnOff(o), true);

        const ifdOff = fg32(8);
        const tagCount = fg16(ifdOff);

        const fujiTags = {};
        const fujiTypes = {};
        const fujiCounts = {};
        for (let i = 0; i < tagCount; i++) {
            const te = ifdOff + 2 + i * 12;
            if (te + 12 > view.byteLength - mnBase) break;
            const ftag = fg16(te);
            const ftype = fg16(te + 2);
            const fcount = fg32(te + 4);
            let fval;
            if (ftype === 3) fval = fg16(te + 8);
            else if (ftype === 4) fval = fg32(te + 8);
            else if (ftype === 8) { const v = fg16(te + 8); fval = v > 32767 ? v - 65536 : v; }
            else if (ftype === 9) fval = fi32(te + 8);
            else fval = fg32(te + 8);
            fujiTags[ftag] = fval;
            fujiTypes[ftag] = ftype;
            fujiCounts[ftag] = fcount;
        }

        // Film Simulation (0x1401)
        const filmSimMap = {
            0x0: 'Provia/STD', 0x100: 'Provia/STD',
            0x110: 'Astia/Soft', 0x120: 'Astia/Soft',
            0x200: 'Velvia/Vivid', 0x300: 'Velvia/Vivid', 0x400: 'Velvia/Vivid',
            0x500: 'PRO Neg. Std', 0x501: 'PRO Neg. Hi',
            0x600: 'Classic Chrome',
            0x700: 'Eterna',
            0x800: 'Classic Negative',
            0x900: 'Eterna Bleach Bypass',
            0xA00: 'Nostalgic Negative',
            0xB00: 'Reala Ace',
        };
        if (fujiTags[0x1401] !== undefined) {
            result.filmSimulation = filmSimMap[fujiTags[0x1401]] || '';
        }

        // Monochrome/Acros override via Saturation (0x1003)
        if (fujiTags[0x1003] !== undefined) {
            const sat = fujiTags[0x1003];
            const monoMap = {
                0x300: 'Monochrome', 0x301: 'Monochrome+R', 0x302: 'Monochrome+Ye', 0x303: 'Monochrome+G',
                0x310: 'Sepia',
                0x500: 'Acros', 0x501: 'Acros+R', 0x502: 'Acros+Ye', 0x503: 'Acros+G'
            };
            if (monoMap[sat]) result.filmSimulation = monoMap[sat];
        }

        // White Balance (0x1002)
        const wbMap = {
            0x0: 'Auto', 0x1: 'Auto (white priority)', 0x2: 'Auto (ambiance priority)',
            0x100: 'Daylight', 0x200: 'Cloudy',
            0x300: 'Daylight Fluorescent', 0x301: 'Day White Fluorescent',
            0x302: 'White Fluorescent', 0x303: 'Warm White Fluorescent',
            0x304: 'Living Room Warm White Fluorescent',
            0x400: 'Incandescent', 0x500: 'Flash', 0x600: 'Underwater',
            0xF00: 'Custom', 0xF01: 'Custom2', 0xF02: 'Custom3',
            0xF03: 'Custom4', 0xF04: 'Custom5',
            0xFF0: 'Kelvin'
        };
        if (fujiTags[0x1002] !== undefined) {
            result.whiteBalance = wbMap[fujiTags[0x1002]] || 'Auto';
            if (fujiTags[0x1002] === 0xFF0 && fujiTags[0x1005] !== undefined) {
                result.whiteBalance = fujiTags[0x1005] + 'K';
            }
        }

        // WB Fine Tune — 0x100A. Newer cameras: type=SLONG count=2, value is offset
        // to (Red_i32, Blue_i32) pair, each stored ×20. Older cameras: 0x100A is Red
        // shift and 0x100B is Blue shift directly, as int16 (may be ×20 or ×1).
        if (fujiTags[0x100A] !== undefined) {
            let redRaw = null, blueRaw = null;
            const t100a = fujiTypes[0x100A];
            const c100a = fujiCounts[0x100A];
            try {
                if ((t100a === 9 || t100a === 4) && c100a === 2) {
                    const off = fujiTags[0x100A];
                    redRaw = fi32(off);
                    blueRaw = fi32(off + 4);
                } else {
                    redRaw = fujiTags[0x100A];
                    if (t100a === 3 && redRaw > 32767) redRaw -= 65536;
                    if (fujiTags[0x100B] !== undefined) {
                        blueRaw = fujiTags[0x100B];
                        const t100b = fujiTypes[0x100B];
                        if (t100b === 3 && blueRaw > 32767) blueRaw -= 65536;
                    } else {
                        blueRaw = 0;
                    }
                }
            } catch (e) {}
            console.log('[EXIF] WBFineTune raw R=' + redRaw + ' B=' + blueRaw + ' (t=' + t100a + ' c=' + c100a + ')');
            if (redRaw !== null && blueRaw !== null) {
                let red = null, blue = null;
                for (const d of [20, 10, 1]) {
                    const r = redRaw / d, b = blueRaw / d;
                    const rr = Math.round(r), rb = Math.round(b);
                    if (Math.abs(r - rr) < 0.1 && Math.abs(b - rb) < 0.1 &&
                        rr >= -9 && rr <= 9 && rb >= -9 && rb <= 9) {
                        red = rr; blue = rb;
                        break;
                    }
                }
                if (red !== null && (red !== 0 || blue !== 0)) {
                    const parts = [];
                    if (red !== 0) parts.push((red > 0 ? '+' : '') + red + ' Red');
                    if (blue !== 0) parts.push((blue > 0 ? '+' : '') + blue + ' Blue');
                    result.wbShift = parts.join(', ');
                }
            }
        }

        // Highlight Tone (0x1041) / Shadow Tone (0x1040) — values in steps of 8
        const toneMap = {
            '-64': '+4', '-56': '+3.5', '-48': '+3', '-40': '+2.5',
            '-32': '+2', '-24': '+1.5', '-16': '+1', '-8': '+0.5',
            '0': '0',
            '8': '-0.5', '16': '-1', '24': '-1.5', '32': '-2'
        };
        if (fujiTags[0x1041] !== undefined) {
            result.highlightTone = toneMap['' + fujiTags[0x1041]] || '' + fujiTags[0x1041];
        }
        if (fujiTags[0x1040] !== undefined) {
            result.shadowTone = toneMap['' + fujiTags[0x1040]] || '' + fujiTags[0x1040];
        }

        // Color / Saturation (0x1003) — skip if monochrome/acros
        if (fujiTags[0x1003] !== undefined) {
            const sat = fujiTags[0x1003];
            const satMap = {
                0x0: '0', 0x80: '+1', 0x100: '+2', 0xC0: '+3', 0xE0: '+4',
                0x180: '-1', 0x400: '-2', 0x4C0: '-3', 0x4E0: '-4'
            };
            const isMono = (sat >= 0x300 && sat <= 0x310) || (sat >= 0x500 && sat <= 0x503) || sat === 0x200 || sat === 0x8000;
            if (!isMono && satMap[sat] !== undefined) {
                result.color = satMap[sat];
            }
        }

        // Sharpness (0x1001)
        if (fujiTags[0x1001] !== undefined) {
            const sharpMap = {
                0x0: '-4', 0x1: '-3', 0x2: '-2', 0x3: '0', 0x4: '+2',
                0x5: '+3', 0x6: '+4', 0x82: '-1', 0x84: '+1'
            };
            result.sharpness = sharpMap[fujiTags[0x1001]];
        }

        // Noise Reduction (0x100E)
        if (fujiTags[0x100E] !== undefined) {
            const nrMap = {
                0x0: '0', 0x100: '+2', 0x180: '+1', 0x1C0: '+3', 0x1E0: '+4',
                0x200: '-2', 0x280: '-1', 0x2C0: '-3', 0x2E0: '-4'
            };
            result.noiseReduction = nrMap[fujiTags[0x100E]];
        }

        // Dynamic Range: 0x1402 (setting) + 0x1403 (development range)
        if (fujiTags[0x1402] !== undefined) {
            const drSetting = fujiTags[0x1402];
            if (drSetting === 0) {
                result.dynamicRange = 'DR-Auto';
            } else if (drSetting === 1 && fujiTags[0x1403] !== undefined) {
                result.dynamicRange = 'DR' + fujiTags[0x1403];
            } else {
                const drMap = { 0x100: 'DR100', 0x200: 'DR200', 0x201: 'DR400' };
                result.dynamicRange = drMap[drSetting] || '';
            }
        }

        // Grain Effect: 0x1047 = Roughness, 0x104C = Size
        if (fujiTags[0x1047] !== undefined) {
            const roughMap = { 0: 'Off', 0x20: 'Weak', 0x40: 'Strong' };
            const roughness = roughMap[fujiTags[0x1047]];
            if (roughness === 'Off') {
                result.grainEffect = 'Off';
            } else if (roughness && fujiTags[0x104C] !== undefined) {
                const sizeMap = { 0: 'Off', 0x10: 'Small', 0x20: 'Large' };
                const size = sizeMap[fujiTags[0x104C]] || 'Small';
                result.grainEffect = roughness + ', ' + size;
            } else if (roughness) {
                result.grainEffect = roughness;
            }
        }

        // Color Chrome Effect (0x1048)
        if (fujiTags[0x1048] !== undefined) {
            const cceMap = { 0: 'Off', 0x20: 'Weak', 0x40: 'Strong' };
            if (cceMap[fujiTags[0x1048]] !== undefined) {
                result.colorChromeEffect = cceMap[fujiTags[0x1048]];
            }
        }

        // Color Chrome FX Blue (0x104E)
        if (fujiTags[0x104E] !== undefined) {
            const ccbMap = { 0: 'Off', 0x20: 'Weak', 0x40: 'Strong' };
            if (ccbMap[fujiTags[0x104E]] !== undefined) {
                result.colorChromeFxBlue = ccbMap[fujiTags[0x104E]];
            }
        }

        // Clarity (0x100F) — values in thousands
        if (fujiTags[0x100F] !== undefined) {
            const cv = fujiTags[0x100F];
            const clVal = Math.round(cv / 1000);
            if (clVal >= -5 && clVal <= 5) {
                result.clarity = clVal === 0 ? '0' : (clVal > 0 ? '+' + clVal : '' + clVal);
            }
        }

    } catch (e) {
        console.warn('MakerNote parse error:', e);
    }

    return result;
}

function readExifString(view, tiffStart, type, count, valOff, inlineOff, littleEndian) {
    if (type !== 2) return '';
    const start = count > 4 ? tiffStart + valOff : inlineOff;
    let str = '';
    for (let i = 0; i < count - 1; i++) {
        const c = view.getUint8(start + i);
        if (c === 0) break;
        str += String.fromCharCode(c);
    }
    return str.trim();
}

function applyExifToForm(exif) {
    if (!exif) return false;
    let applied = false;

    if (exif.filmSimulation) {
        const sel = document.getElementById('myFilmSim');
        for (const opt of sel.options) {
            if (opt.text === exif.filmSimulation || opt.value === exif.filmSimulation) {
                sel.value = opt.value;
                applied = true;
                break;
            }
        }
    }
    if (exif.dynamicRange) {
        setSelectValue('myDR', exif.dynamicRange);
        applied = true;
    }
    if (exif.grainEffect) {
        setSelectValue('myGrain', exif.grainEffect);
        applied = true;
    }
    if (exif.colorChromeEffect) {
        setSelectValue('myCCE', exif.colorChromeEffect);
        applied = true;
    }
    if (exif.colorChromeFxBlue) {
        setSelectValue('myCCB', exif.colorChromeFxBlue);
        applied = true;
    }

    // White balance: combine WB name + shift
    if (exif.whiteBalance) {
        let wbStr = exif.whiteBalance;
        if (exif.wbShift) wbStr += ', ' + exif.wbShift;
        document.getElementById('myWB').value = wbStr;
        applied = true;
    }

    if (exif.highlightTone !== undefined) {
        document.getElementById('myHighlight').value = exif.highlightTone;
        applied = true;
    }
    if (exif.shadowTone !== undefined) {
        document.getElementById('myShadow').value = exif.shadowTone;
        applied = true;
    }
    if (exif.color !== undefined) {
        document.getElementById('myColor').value = exif.color;
        applied = true;
    }
    if (exif.sharpness !== undefined) {
        document.getElementById('mySharpness').value = exif.sharpness;
        applied = true;
    }
    if (exif.noiseReduction !== undefined) {
        document.getElementById('myNR').value = exif.noiseReduction;
        applied = true;
    }
    if (exif.clarity !== undefined) {
        document.getElementById('myClarity').value = exif.clarity;
        applied = true;
    }
    if (exif.exposureComp) {
        document.getElementById('myExposure').value = exif.exposureComp;
        applied = true;
    }

    return applied;
}

function setSelectValue(id, val) {
    const sel = document.getElementById(id);
    for (const opt of sel.options) {
        if (opt.text === val || opt.value === val) {
            sel.value = opt.value;
            return;
        }
    }
}

function showExifNotice(exif) {
    const existing = document.querySelector('.exif-notice');
    if (existing) existing.remove();
    const notice = document.createElement('div');
    notice.className = 'exif-notice';
    const model = exif.model || 'FUJIFILM';
    notice.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:16px;height:16px;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>' +
        '<span>' + model + ' の撮影データから設定を自動入力しました</span>';
    const form = document.querySelector('.create-form-grid');
    form.insertBefore(notice, form.children[2]);
    setTimeout(() => { if (notice.parentNode) notice.style.opacity = '0'; setTimeout(() => notice.remove(), 500); }, 8000);
}

async function handleImageFiles(files) {
    let exifApplied = false;
    for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        if (uploadedImages.length >= IMAGE_MAX) break;
        if (!photoUploadRecipeId && !exifApplied && uploadedImages.length === 0 && file.type === 'image/jpeg') {
            try {
                const exif = await parseExifFromFile(file);
                if (exif && applyExifToForm(exif)) {
                    exifApplied = true;
                    showExifNotice(exif);
                }
            } catch (e) { console.warn('EXIF extraction failed:', e); }
        }
        const dataUrl = await readFileAsDataURL(file);
        const compressed = await compressImage(dataUrl);
        uploadedImages.push(compressed);
    }
    renderUploadPreviews();
}

async function saveMyRecipe() {
    // If in photo upload mode for a preset recipe
    if (photoUploadRecipeId) {
        await savePhotoUpload();
        return;
    }

    const title = document.getElementById('myRecipeTitle').value.trim();
    if (!title) {
        alert('レシピ名を入力してください');
        return;
    }

    const recipe = {
        id: editingRecipeId || `my-${Date.now()}`,
        title: title,
        settings: {
            film_simulation: document.getElementById('myFilmSim').value,
            dynamic_range: document.getElementById('myDR').value,
            grain_effect: document.getElementById('myGrain').value,
            color_chrome_effect: document.getElementById('myCCE').value,
            color_chrome_fx_blue: document.getElementById('myCCB').value,
            white_balance: document.getElementById('myWB').value,
            highlight_tone: document.getElementById('myHighlight').value,
            shadow_tone: document.getElementById('myShadow').value,
            color: document.getElementById('myColor').value,
            sharpness: document.getElementById('mySharpness').value,
            noise_reduction: document.getElementById('myNR').value,
            clarity: document.getElementById('myClarity').value,
            exposure_compensation: document.getElementById('myExposure').value,
        },
        images: uploadedImages,
        notes: document.getElementById('myNotes').value.trim(),
        createdAt: editingRecipeId
            ? (myRecipes.find(r => r.id === editingRecipeId)?.createdAt || Date.now())
            : Date.now(),
        updatedAt: Date.now()
    };

    await dbPut(recipe);
    await loadMyRecipes();
    closeCreateModal();
    renderRecipes();
}

async function deleteMyRecipe() {
    if (!editingRecipeId) return;
    if (!confirm('このレシピを削除しますか？')) return;
    await dbDelete(editingRecipeId);
    favorites.delete(editingRecipeId);
    saveFavorites();
    updateFavCounter();
    await loadMyRecipes();
    closeCreateModal();
    renderRecipes();
}

function generateRecipeName() {
    const film = document.getElementById('myFilmSim').value.trim();
    const wb = document.getElementById('myWB').value.trim();
    const parts = [];
    if (film) parts.push(film);
    if (wb) {
        const wbBase = wb.split(',')[0].trim();
        if (wbBase && wbBase !== film) parts.push(wbBase);
    }
    const d = new Date();
    const dateStr = String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
    const base = parts.length ? parts.join(' × ') : 'My Recipe';
    document.getElementById('myRecipeTitle').value = base + ' — ' + dateStr;
}

function buildRecipeShareText() {
    const title = document.getElementById('myRecipeTitle').value.trim() || 'My Recipe';
    const kv = [
        ['Film Simulation', document.getElementById('myFilmSim').value],
        ['Dynamic Range', document.getElementById('myDR').value],
        ['Grain Effect', document.getElementById('myGrain').value],
        ['Color Chrome Effect', document.getElementById('myCCE').value],
        ['Color Chrome FX Blue', document.getElementById('myCCB').value],
        ['White Balance', document.getElementById('myWB').value],
        ['Highlight Tone', document.getElementById('myHighlight').value],
        ['Shadow Tone', document.getElementById('myShadow').value],
        ['Color', document.getElementById('myColor').value],
        ['Sharpness', document.getElementById('mySharpness').value],
        ['Noise Reduction', document.getElementById('myNR').value],
        ['Clarity', document.getElementById('myClarity').value],
        ['Exposure Comp.', document.getElementById('myExposure').value],
    ];
    const lines = ['📷 ' + title, '─────────'];
    for (const [k, v] of kv) if (v && v.trim()) lines.push(k + ': ' + v);
    const notes = document.getElementById('myNotes').value.trim();
    if (notes) { lines.push('─────────'); lines.push(notes); }
    lines.push('');
    lines.push('#FUJIFILM #FilmSimulation');
    return lines.join('\n');
}

async function shareMyRecipe() {
    const text = buildRecipeShareText();
    const title = document.getElementById('myRecipeTitle').value.trim() || 'My Recipe';
    if (navigator.share) {
        try {
            await navigator.share({ title: title, text: text });
            return;
        } catch (e) {
            if (e && e.name === 'AbortError') return;
        }
    }
    try {
        await navigator.clipboard.writeText(text);
        alert('レシピをクリップボードにコピーしました');
    } catch (e) {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); alert('レシピをクリップボードにコピーしました'); }
        catch (err) { alert('コピーに失敗しました'); }
        ta.remove();
    }
}

// Toggle Favorite Status
function toggleFavorite(id) {
    if (favorites.has(id)) {
        favorites.delete(id);
    } else {
        favorites.add(id);
    }
    saveFavorites();
    updateFavCounter();
    renderRecipes();
}

// Save Favorites to localStorage
function saveFavorites() {
    localStorage.setItem('fuji_favorites_original', JSON.stringify(Array.from(favorites)));
}

// Load Favorites from localStorage
function loadFavorites() {
    const data = localStorage.getItem('fuji_favorites_original');
    if (data) {
        try {
            favorites = new Set(JSON.parse(data));
        } catch (error) {
            console.error('Error loading favorites from localStorage:', error);
            favorites = new Set();
        }
    }
}

// Update Favorites Counter
function updateFavCounter() {
    favCountEl.textContent = favorites.size;
}

// Event Listeners setup
function setupEventListeners() {
    searchInput.addEventListener('input', () => {
        const val = searchInput.value;
        clearSearchBtn.style.display = val ? 'flex' : 'none';
        renderRecipes();
    });

    clearSearchBtn.addEventListener('click', () => {
        searchInput.value = '';
        clearSearchBtn.style.display = 'none';
        searchInput.focus();
        renderRecipes();
    });

    tabButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            tabButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-gen');
            renderRecipes();
        });
    });

    favToggleBtn.addEventListener('click', () => {
        showFavoritesOnly = !showFavoritesOnly;
        favToggleBtn.classList.toggle('active', showFavoritesOnly);
        renderRecipes();
    });

    modalClose.addEventListener('click', closeModal);
    recipeModal.addEventListener('click', (e) => {
        if (e.target === recipeModal) closeModal();
    });

    createRecipeBtn.addEventListener('click', () => openCreateModal());
    createModalClose.addEventListener('click', closeCreateModal);
    cancelCreateBtn.addEventListener('click', closeCreateModal);
    saveRecipeBtn.addEventListener('click', saveMyRecipe);
    deleteRecipeBtn.addEventListener('click', deleteMyRecipe);
    shareRecipeBtn.addEventListener('click', shareMyRecipe);
    autoNameBtn.addEventListener('click', generateRecipeName);
    createModal.addEventListener('click', (e) => {
        if (e.target === createModal) closeCreateModal();
    });

    imageUploadArea.addEventListener('click', (e) => {
        if (e.target.closest('.upload-preview-remove')) return;
        myRecipeImageInput.click();
    });
    myRecipeImageInput.addEventListener('change', (e) => {
        handleImageFiles(e.target.files);
        myRecipeImageInput.value = '';
    });

    imageUploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        imageUploadArea.classList.add('drag-over');
    });
    imageUploadArea.addEventListener('dragleave', () => {
        imageUploadArea.classList.remove('drag-over');
    });
    imageUploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        imageUploadArea.classList.remove('drag-over');
        handleImageFiles(e.dataTransfer.files);
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (createModal.classList.contains('open')) {
                closeCreateModal();
            } else if (recipeModal.classList.contains('open')) {
                closeModal();
            }
        }
    });
}

// Run app
window.addEventListener('DOMContentLoaded', init);

</script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
    </script>
</body>
</html>
